name: Rebuild search index

# Runs whenever the source documents or extraction/index scripts change on
# main, so the deployed chatbot always has an up-to-date index without you
# having to run the scripts locally.

on:
  push:
    branches: [main]
    paths:
      - "data/raw/**"
      - "extract_data.py"
      - "build_index.py"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  rebuild-index:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Extract data
        run: python extract_data.py

      - name: Build index
        run: python build_index.py

      - name: Commit updated index
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/processed/corpus.jsonl data/processed/index.pkl
          git diff --cached --quiet || git commit -m "Auto-rebuild search index [skip ci]"
          git push
